# =============================================================
# CI — Lint + Type Check + Build verification
# =============================================================
# Deploy is handled automatically by Cloudflare Pages
# Git integration (connected to this repo).
# This workflow runs checks on every push and PR.
# =============================================================

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check + Build
        run: npm run build
