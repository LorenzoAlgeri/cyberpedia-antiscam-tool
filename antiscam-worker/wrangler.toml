name = "antiscam-worker"
main = "src/index.ts"
compatibility_date = "2025-03-01"

# ── KV namespace for simulation cache ────────────────────────────────────────
# 12 max combinations (4 attackType × 3 difficulty) → few Gemini calls/day.
#
# After first deploy, create the namespaces and replace the placeholder IDs:
#   wrangler kv namespace create ANTISCAM_SIMULATIONS_CACHE
#   wrangler kv namespace create ANTISCAM_SIMULATIONS_CACHE --preview
# Then paste the returned IDs below.

[[kv_namespaces]]
binding = "ANTISCAM_SIMULATIONS_CACHE"
id = "26864f73a49a4089a44f408c0c56317f"
preview_id = "26864f73a49a4089a44f408c0c56317f"

# ── KV namespace for rate limiting ───────────────────────────────────────────
# Kept separate from ANTISCAM_SIMULATIONS_CACHE intentionally:
#   - independent quota, TTL profile (1h vs 24h), and dashboard monitoring
#   - eliminates any risk of "rl:" keys colliding with "sim:" cache keys
#
# Create before first deploy:
#   wrangler kv namespace create ANTISCAM_RATELIMIT
#   wrangler kv namespace create ANTISCAM_RATELIMIT --preview
# Then paste the returned IDs below.

[[kv_namespaces]]
binding = "ANTISCAM_RATELIMIT"
id = "4bf7e2be994b433ca4304e712b47891e"
preview_id = "4e0b8f0506c742d1a83b9c680ff265ef"

# ── KV namespace for lead capture ──────────────────────────────────────────
# Stores pre-conference lead submissions (name, email, role).
# Create before deploy:
#   wrangler kv namespace create ANTISCAM_LEADS
#   wrangler kv namespace create ANTISCAM_LEADS --preview

[[kv_namespaces]]
binding = "ANTISCAM_LEADS"
id = "97c8980f4cad4c009bb6c14a37b95281"
preview_id = "9ed1a369ab0d41cfbcb809d187545c9a"

# ── KV namespace for anonymous analytics counters ────────────────────────────
# Stores aggregated counters only (no individual events, no PII).
# Create before deploy:
#   wrangler kv namespace create ANTISCAM_ANALYTICS
#   wrangler kv namespace create ANTISCAM_ANALYTICS --preview

[[kv_namespaces]]
binding = "ANTISCAM_ANALYTICS"
id = "c618000a07ab480f860290645d6c121b"
preview_id = "c9e134ca6f92432986119d346ceece3f"

# ── Secrets (never put values here) ─────────────────────────────────────────
# Set via CLI after deploy:
#   wrangler secret put N8N_WEBHOOK_URL
#   wrangler secret put N8N_TRAINING_WEBHOOK_URL
#
# Values:
#   N8N_WEBHOOK_URL          → webhook per simulazioni scripted
#   N8N_TRAINING_WEBHOOK_URL → (set via `wrangler secret put`)
#
# Secrets appear automatically in the Env type at runtime.
# Listed here as documentation only — Cloudflare ignores unknown top-level keys.
